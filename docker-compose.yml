version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: clinix_db
      POSTGRES_USER: clinix_user
      POSTGRES_PASSWORD: clinix_pass_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinix_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 clinix_project.asgi:application"
    environment:
      - DJANGO_SETTINGS_MODULE=clinix_project.settings.production
      - DATABASE_URL=postgres://clinix_user:clinix_pass_2026@db:5432/clinix_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_files:/app/media

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A clinix_project worker --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=clinix_project.settings.production
      - DATABASE_URL=postgres://clinix_user:clinix_pass_2026@db:5432/clinix_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A clinix_project beat --loglevel=info
    environment:
      - DJANGO_SETTINGS_MODULE=clinix_project.settings.production
      - DATABASE_URL=postgres://clinix_user:clinix_pass_2026@db:5432/clinix_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  admin_dashboard:
    build:
      context: ./admin_dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media_files:
