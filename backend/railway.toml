[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -u manage.py migrate --noinput && python -u manage.py collectstatic --noinput && daphne -v 2 -b 0.0.0.0 -p $PORT clinix_project.asgi:application"
healthcheckPath = "/api/v1/system/settings/fee/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
