[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Per-service start commands are configured in each Railway service's UI:
#   clinix         -> sh -c 'python -u manage.py migrate --noinput && exec daphne -v 2 -b 0.0.0.0 -p 8080 clinix_project.asgi:application'
#   Worker Service -> celery -A clinix_project worker --loglevel=info
#   Beat Service   -> celery -A clinix_project beat --loglevel=info
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
