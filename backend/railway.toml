[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -u manage.py migrate --noinput && python -u manage.py collectstatic --noinput && daphne -v 2 -b 0.0.0.0 -p ${PORT:-8080} clinix_project.asgi:application"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
