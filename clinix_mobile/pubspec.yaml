name: clinix_mobile
description: Clinix - Healthcare platform for Cameroon
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.1

  # HTTP Client
  dio: ^5.4.3+1

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.1
  google_sign_in: ^6.2.1

  # Images & Files
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # UI
  shimmer: ^3.0.0

  # Localizations
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # Utils
  uuid: ^4.3.3
  equatable: ^2.0.5
  logger: ^2.3.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  http: ^1.2.1

  # Communication & Video Call
  agora_rtc_engine: ^6.3.2
  web_socket_channel: ^3.0.1
  
  # Maps
  google_maps_flutter: any
  google_maps_flutter_android: any
  google_maps_flutter_platform_interface: any
  geolocator: any
  flutter_polyline_points: ^3.1.0
  flutter_dotenv: ^6.0.0
  
  # Health & Vitals
  heart_bpm: ^2.0.0
  pedometer: ^4.0.1
  fl_chart: ^0.68.0
  camera: ^0.10.5+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/icons/
